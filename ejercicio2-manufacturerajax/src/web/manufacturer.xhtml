<html xmlns="http://www.w3.org/1999/xhtml"
xmlns:h="http://java.sun.com/jsf/html"
xmlns:f="http://java.sun.com/jsf/core">

<h:head>
<title>Manufacturers</title>
</h:head>

<h:body>

<h2>Buscar fabricante</h2>

<h:form>

<h:inputText value="#{manufacturerManagedBean.search}">

<f:ajax event="keyup" render="tabla"/>

</h:inputText>

</h:form>

<h:dataTable value="#{manufacturerManagedBean.filtered}" var="m" id="tabla">

<h:column>
<f:facet name="header">ID</f:facet>
#{m.id}
</h:column>

<h:column>
<f:facet name="header">Name</f:facet>
#{m.name}
</h:column>

<h:column>
<f:facet name="header">Country</f:facet>
#{m.country}
</h:column>

</h:dataTable>

</h:body>

</html>
